<!DOCTYPE html>
<html lang="en"  class="html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="css/contact_us.css">
</head>
<body class="body">
    <div class="contact_container">
        <div class="contact_ways flex_box">
            <div class="contact_ways_items flex_box">
                <div class="contact_icon">
                    <img src="src/location.svg" alt="">
                </div>
                <h4>Address</h4>
                <p>
                    Surkhnet, NP12 <br>
                    Birendranagar 06
                </p>
            </div>

            <div class="contact_ways_items flex_box">
                <div class="contact_icon">
                    <img src="src/phone.svg" alt="">
                </div>
                <h4>Phone</h4>
                <p>
                    +1 9893 5647 <br>
                    +1 3434 5678
                </p>
            </div>

            <div class="contact_ways_items flex_box">
                <div class="contact_icon">
                    <img src="src/mail.svg" alt="">
                </div>
                <h4>Email</h4>
                <p>
                    mcdonalds.@gmail.com <br>
                    info.mcdonalds.@gmail.com
                </p>
            </div>
        </div>

        <div class="contact_msg flex_box">
            <form action="" class="message_form flex_box">
                <h2>Send us a message</h2>
                <p>if you have any work or any idea related McDonald`s, you can send message from here. it`s our pleasure to help you</p>
                <input type="text" placeholder="Enter your name">
                <input type="text" placeholder="Enter your email">
                <textarea name="" id="" placeholder="Enter your message"></textarea>
                <div>
                    <button>Send Now</button>
                    <button><a href="index.html">Home</a></button>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
